<div class="site" id="main">

  <section class="pp-section">
    <div class="inner" style="max-width:720px;">
      <div class="pp-eyebrow" data-order-eyebrow>Loading order&hellip;</div>

      <div data-order-body hidden>
        <dl class="checkout-summary-totals" style="border-top:none;padding-top:0;">
          <div><dt>Status</dt><dd><span class="status-pill" data-order-status></span></dd></div>
          <div><dt>Placed</dt><dd data-order-date></dd></div>
          <div><dt>Tracking</dt><dd data-order-tracking>, </dd></div>
        </dl>

        <h2 style="font-family:var(--serif);font-size:24px;font-weight:400;margin:32px 0 12px;color:var(--ink);">Items</h2>
        <div data-order-items></div>

        <dl class="checkout-summary-totals">
          <div><dt>Subtotal</dt><dd data-order-subtotal>, </dd></div>
          <div><dt>Shipping</dt><dd data-order-shipping>, </dd></div>
          <div class="total"><dt>Total</dt><dd data-order-total>, </dd></div>
        </dl>

        <div style="margin-top:32px;display:flex;gap:12px;flex-wrap:wrap;">
          <button class="btn btn-dark" type="button" data-buy-again>Buy again</button>
          <a class="btn btn-dark" style="background:transparent;color:var(--ink);border:1px solid var(--ink);text-decoration:none;" href="mailto:zachary@getaplomb.com?subject=Order%20support">Contact support</a>

</div>

<script src="/assets/cart.js" defer></script>
<script>
(function () {
  'use strict';
  function $(s){ return document.querySelector(s); }
  function fmt(cents){ if (cents == null) return ', '; const d = cents/100; return '$' + (d % 1 === 0 ? d.toFixed(0) : d.toFixed(2)); }
  function fmtDate(s){ if (!s) return ', '; try { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); } catch(_){ return s; } }
  function shortId(id){ return (id || '').toString().slice(0, 8).toUpperCase(); }
  function escapeHtml(s){ return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }

  function showError(msg){
    $('[data-order-eyebrow]').textContent = 'Error';
    const el = $('[data-order-error]'); el.hidden = false; el.textContent = msg;
  }

  async function load() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { showError('No order ID provided.'); return; }
    let resp;
    try { resp = await fetch('/api/order/' + encodeURIComponent(id)); }
    catch (_) { showError('Network error.'); return; }
    if (!resp.ok) { showError('Could not load this order.'); return; }
    const o = await resp.json();
    render(o);
  }

  function render(o) {
    $('[data-order-eyebrow]').textContent = 'Order #' + shortId(o.stripe_payment_intent_id || o.stripe_checkout_session_id || o.id);
    $('[data-order-ref]').textContent = '#' + shortId(o.stripe_payment_intent_id || o.stripe_checkout_session_id || o.id);
    $('[data-order-body]').hidden = false;
    $('[data-order-status]').textContent = o.status || ', ';
    $('[data-order-status]').classList.add('status-' + (o.status || 'pending'));
    $('[data-order-date]').textContent = fmtDate(o.created_at);
    $('[data-order-tracking]').textContent = o.tracking_number
      ? `${o.tracking_number} (${o.carrier || 'carrier'})`
      : 'Not yet shipped';

    const items = o.line_items || [];
    $('[data-order-items]').innerHTML = items.map(li => {
      const lineCents = (li.unitPriceCents || 0) * (li.quantity || 1);
      return `
        <div class="checkout-summary-item">
          <div>
            <div class="checkout-summary-name">${escapeHtml(li.name || li.productKey)}</div>
            <div class="checkout-summary-meta">Qty ${li.quantity || 1}${li.mode === 'subscription' ? ' &middot; subscription' : ''}</div>
          </div>
          <div class="checkout-summary-price">${fmt(lineCents)}</div>
        </div>
      `;
    }).join('');

    $('[data-order-subtotal]').textContent = fmt(o.subtotal_cents);
    $('[data-order-shipping]').textContent = o.shipping_cents == null ? ', ' : (o.shipping_cents === 0 ? 'Free' : fmt(o.shipping_cents));
    $('[data-order-total]').textContent = fmt(o.total_cents || o.subtotal_cents);

    // Buy again, populate cart with order's line items
    $('[data-buy-again]').onclick = function () {
      if (!window.AplombCart) return;
      window.AplombCart.clear();
      for (const li of items) {
        window.AplombCart.add(li.productKey, li.mode || 'onetime', li.quantity || 1);
      }
    };
  }

  document.addEventListener('DOMContentLoaded', load);
})();
</script>
</body>
</html>
