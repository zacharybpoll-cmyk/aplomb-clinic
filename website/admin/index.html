<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Admin, Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/assets/aplomb-mark.svg">
<link rel="stylesheet" href="/css/site.css?v=20260519a">
<style>
  .admin-page { max-width: 1240px; margin: 0 auto; padding: 32px 48px; }
  .admin-page h1 { font-family: var(--serif); font-size: 36px; font-weight: 400; margin: 0 0 24px; color: var(--ink); }
  .admin-tabs { display:flex; gap: 24px; margin-bottom: 24px; border-bottom: 1px solid var(--border, #d8cdb6); padding-bottom: 12px; }
  .admin-tabs button {
    background: transparent; border: 0; padding: 8px 4px;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  }
  .admin-tabs button.is-active { color: var(--ink); border-bottom-color: var(--amber); }
  .admin-table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; }
  .admin-table th.admin-table td { text-align: left; padding: 10px 12px; border-bottom: 1px solid rgba(26,21,18,0.08); vertical-align: top; }
  .admin-table th { font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; }
  .admin-table tr:hover { background: rgba(122,61,20,0.03); }
  .admin-table input[type="text"].admin-table select {
    padding: 6px 8px; border: 1px solid var(--border, #d8cdb6); border-radius: 3px;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; background: var(--paper);
  }
  .admin-table button {
    background: var(--ink); color: var(--paper); border: 0; padding: 6px 10px;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer;
  }
  .admin-table button:hover { background: var(--amber); }
  .admin-table button:disabled { opacity: 0.4; cursor: not-allowed; }
  .admin-row-addr { color: var(--muted); font-size: 11px; line-height: 1.4; }
  .admin-empty { padding: 48px; text-align: center; color: var(--muted); font-family: 'IBM Plex Sans', sans-serif; }
  .admin-status { padding: 8px 12px; margin: 8px 0; font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; border-radius: 3px; }
  .admin-status.is-ok { background: rgba(52,184,30,0.08); color: #1c7a14; }
  .admin-status.is-err { background: rgba(184,52,30,0.08); color: #b8341e; }
  /* Command Center — Overview tab */
  .cc-section { margin: 4px 0 28px; }
  .cc-section > h2 {
    font-family: var(--serif); font-weight: 500; font-size: 18px; color: var(--ink);
    margin: 0 0 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(26,21,18,0.08);
  }
  .cc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .cc-card {
    border: 1px solid var(--border, #d8cdb6); border-radius: 4px; padding: 16px 18px;
    background: var(--paper); display: flex; flex-direction: column; gap: 4px; min-height: 116px;
  }
  .cc-card.is-muted { background: transparent; border-style: dashed; }
  .cc-card h4 {
    margin: 0; font-family: 'IBM Plex Sans', sans-serif; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted);
  }
  .cc-big { font-family: var(--serif); font-size: 30px; line-height: 1.15; color: var(--ink); }
  .cc-sub { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; color: var(--muted); line-height: 1.6; }
  .cc-sub b { color: var(--ink); font-weight: 600; }
  .cc-spark { margin-top: auto; padding-top: 10px; display: block; width: 100%; height: 40px; }
  .cc-spark path { stroke: var(--amber); }
  .cc-mini { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; color: var(--ink); margin-top: 2px; }
  .cc-mini span { color: var(--muted); float: right; }
  .cc-flag { font-size: 10px; color: #b8341e; font-family: 'IBM Plex Sans', sans-serif; }
  .cc-note { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.5; }
</style>
</head>
<body>
<div class="admin-page">

  <h1>APLOMB. Operations</h1>

  <div class="admin-tabs">
    <button type="button" data-tab="overview" class="is-active">Overview</button>
    <button type="button" data-tab="paid">Awaiting shipment</button>
    <button type="button" data-tab="shipped">Recently shipped</button>
    <button type="button" data-tab="all">All</button>
    <button type="button" data-tab="reviews">Reviews</button>
  </div>

  <div data-admin-status></div>

  <div data-admin-loading style="color:var(--muted);font-family:'IBM Plex Sans',sans-serif;">Loading&hellip;</div>

  <div data-admin-content hidden></div>

</div>

<script>
(function () {
  'use strict';
  function $(s){ return document.querySelector(s); }
  function fmt(cents){ if (cents == null) return ', '; const d = cents/100; return '$' + (d % 1 === 0 ? d.toFixed(0) : d.toFixed(2)); }
  function fmtDate(s){ if (!s) return ', '; try { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); } catch(_){ return s; } }
  function shortId(id){ return (id || '').toString().slice(0, 8).toUpperCase(); }
  function escapeHtml(s){ return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }

  let currentTab = 'paid';

  function showStatus(msg, ok) {
    const el = $('[data-admin-status]');
    el.innerHTML = `<div class="admin-status ${ok ? 'is-ok' : 'is-err'}">${escapeHtml(msg)}</div>`;
    setTimeout(() => { el.innerHTML = ''; }, 4000);
  }

  async function load(tab) {
    currentTab = tab;
    $('[data-admin-loading]').hidden = false;
    $('[data-admin-content]').hidden = true;
    let resp;
    try { resp = await fetch('/api/admin/orders?status=' + encodeURIComponent(tab), { credentials: 'include' }); }
    catch(_) { showStatus('Network error.', false); return; }
    if (!resp.ok) {
      if (resp.status === 401 || resp.status === 403) {
        showStatus('Not authorized. Make sure Cloudflare Access has approved your email.', false);
      } else {
        showStatus('Could not load orders (HTTP ' + resp.status + ').', false);
      }
      return;
    }
    const { orders } = await resp.json();
    render(orders || []);
  }

  function render(orders) {
    $('[data-admin-loading]').hidden = true;
    const c = $('[data-admin-content]'); c.hidden = false;
    if (!orders.length) {
      c.innerHTML = '<div class="admin-empty">No orders.</div>';
      return;
    }
    c.innerHTML = `
      <table class="admin-table">
        <thead><tr>
          <th>Order</th><th>Customer</th><th>Items</th><th>Address</th><th>Total</th>
          <th>Status</th><th>Tracking</th><th></th>
        </tr></thead>
        <tbody>${orders.map(o => row(o)).join('')}</tbody>
      </table>
    `;
  }

  function row(o) {
    const id = o.id;
    const ref = shortId(o.stripe_payment_intent_id || o.stripe_checkout_session_id || id);
    const items = (o.line_items || []).map(li => `${escapeHtml(li.name || li.productKey)} × ${li.quantity || 1}`).join('<br>');
    const addr = o.shipping_address || {};
    const addrLine = `${escapeHtml(addr.line1 || '')}, ${escapeHtml(addr.city || '')}, ${escapeHtml(addr.state || '')} ${escapeHtml(addr.postal_code || '')}`;
    const total = fmt(o.total_cents || o.total_cents_override || o.subtotal_cents);
    const isShipped = o.status === 'shipped';
    return `
      <tr data-order-id="${escapeHtml(id)}">
        <td>
          <div style="font-weight:600;">#${ref}</div>
          <div style="color:var(--muted);font-size:11px;">${fmtDate(o.paid_at || o.created_at)}</div>
        </td>
        <td>
          <div>${escapeHtml(o.customer_name || '')}</div>
          <div style="color:var(--muted);font-size:11px;">${escapeHtml(o.email || '')}</div>
        </td>
        <td>${items}</td>
        <td class="admin-row-addr">${addrLine}</td>
        <td>${total}</td>
        <td><span class="status-pill status-${escapeHtml(o.status || 'pending')}">${escapeHtml(o.status || 'pending')}</span></td>
        <td>
          ${isShipped
            ? `<div>${escapeHtml(o.tracking_number || '')}<br><span style="color:var(--muted);font-size:11px;">${escapeHtml((o.carrier || '').toUpperCase())}</span></div>`
            : `<div style="display:flex;gap:6px;align-items:center;">
                 <input type="text" placeholder="Tracking #" data-tracking-input maxlength="40" style="width:140px;">
                 <select data-carrier-select>
                   <option value="usps">USPS</option>
                   <option value="ups">UPS</option>
                   <option value="fedex">FedEx</option>
                   <option value="dhl">DHL</option>
                   <option value="other">Other</option>
                 </select>
               </div>`
          }
        </td>
        <td>
          ${isShipped ? '' : `<button type="button" data-mark-shipped>Mark shipped</button>`}
        </td>
      </tr>
    `;
  }

  document.addEventListener('click', async function (e) {
    const tab = e.target.closest('[data-tab]');
    if (tab) {
      document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('is-active', b === tab));
      if (tab.dataset.tab === 'overview') { loadOverview(); }
      else if (tab.dataset.tab === 'reviews') { loadReviews('pending'); }
      else { load(tab.dataset.tab); }
      return;
    }
    const ccRefresh = e.target.closest('[data-cc-refresh]');
    if (ccRefresh) { e.preventDefault(); loadOverview(true); return; }
    const reviewFilter = e.target.closest('[data-review-filter]');
    if (reviewFilter) { loadReviews(reviewFilter.value); return; }
    const rAct = e.target.closest('[data-review-action]');
    if (rAct) {
      const tr = rAct.closest('tr');
      const id = tr.dataset.reviewId;
      const action = rAct.dataset.reviewAction;
      rAct.disabled = true; rAct.textContent = 'Working…';
      let resp;
      try { resp = await fetch('/api/admin/reviews', { method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id, action }) }); }
      catch(_) { showStatus('Network error.', false); rAct.disabled = false; return; }
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        showStatus(err.error || ('Could not update review (HTTP ' + resp.status + ').'), false);
        rAct.disabled = false; return;
      }
      showStatus('Review ' + action + 'ed.', true);
      const sel = document.querySelector('[data-review-filter]');
      loadReviews(sel ? sel.value : 'pending');
      return;
    }
    const ship = e.target.closest('[data-mark-shipped]');
    if (!ship) return;
    const row = ship.closest('tr');
    const orderId = row.dataset.orderId;
    const trackingNumber = row.querySelector('[data-tracking-input]').value.trim();
    const carrier = row.querySelector('[data-carrier-select]').value;
    if (!trackingNumber) { showStatus('Enter a tracking number first.', false); return; }
    ship.disabled = true; ship.textContent = 'Working…';
    let resp;
    try { resp = await fetch('/api/admin/ship-order', { method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ orderId, trackingNumber, carrier }) }); }
    catch(_) { showStatus('Network error.', false); ship.disabled = false; ship.textContent = 'Mark shipped'; return; }
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      showStatus(err.error || ('Could not ship order (HTTP ' + resp.status + ').'), false);
      ship.disabled = false; ship.textContent = 'Mark shipped';
      return;
    }
    showStatus('Order shipped. Shipping email sent.', true);
    load(currentTab);
  });

  async function loadReviews(status) {
    status = status || 'pending';
    $('[data-admin-loading]').hidden = false;
    $('[data-admin-content]').hidden = true;
    let resp;
    try { resp = await fetch('/api/admin/reviews?status=' + encodeURIComponent(status), { credentials: 'include' }); }
    catch(_) { showStatus('Network error.', false); return; }
    if (!resp.ok) {
      if (resp.status === 401 || resp.status === 403) {
        showStatus('Not authorized. Make sure Cloudflare Access has approved your email.', false);
      } else {
        showStatus('Could not load reviews (HTTP ' + resp.status + ').', false);
      }
      return;
    }
    const { reviews } = await resp.json();
    renderReviews(reviews || [], status);
  }

  function renderReviews(reviews, status) {
    $('[data-admin-loading]').hidden = true;
    const c = $('[data-admin-content]'); c.hidden = false;
    const filter = `
      <div style="margin-bottom:16px;">
        <select data-review-filter style="padding:6px 8px;border:1px solid var(--border,#d8cdb6);font-family:'IBM Plex Sans',sans-serif;font-size:12px;background:var(--paper);">
          <option value="pending"${status==='pending'?' selected':''}>Pending</option>
          <option value="published"${status==='published'?' selected':''}>Published</option>
          <option value="rejected"${status==='rejected'?' selected':''}>Rejected</option>
        </select>
      </div>`;
    if (!reviews.length) {
      c.innerHTML = filter + '<div class="admin-empty">No ' + escapeHtml(status) + ' reviews.</div>';
      return;
    }
    c.innerHTML = filter + `
      <table class="admin-table">
        <thead><tr>
          <th>Product</th><th>Rating</th><th>Review</th><th>Name</th><th>Submitted</th><th></th>
        </tr></thead>
        <tbody>${reviews.map(r => reviewRow(r)).join('')}</tbody>
      </table>`;
  }

  function reviewRow(r) {
    let stars = ''; for (let i = 1; i <= 5; i++) stars += i <= r.rating ? '★' : '☆';
    const actions = r.status === 'published'
      ? `<button type="button" data-review-action="unpublish">Unpublish</button>`
      : `<button type="button" data-review-action="publish">Publish</button>
         <button type="button" data-review-action="reject">Reject</button>`;
    return `
      <tr data-review-id="${escapeHtml(r.id)}">
        <td>${escapeHtml(r.product_key)}</td>
        <td><span style="color:var(--amber);letter-spacing:0.1em;">${stars}</span></td>
        <td style="max-width:420px;">
          ${r.title ? `<div style="font-weight:600;">${escapeHtml(r.title)}</div>` : ''}
          <div style="color:var(--ink);">${escapeHtml(r.body)}</div>
        </td>
        <td>${escapeHtml(r.customer_name || '-')}</td>
        <td style="color:var(--muted);font-size:11px;">${fmtDate(r.created_at)}</td>
        <td style="white-space:nowrap;display:flex;gap:6px;">${actions}</td>
      </tr>`;
  }

  // ── Command Center (Overview tab) ──────────────────────────────────────
  function ccMoney(c){ if (c == null) return '—'; const d = c/100; return '$' + d.toLocaleString('en-US', { minimumFractionDigits: (d % 1 ? 2 : 0), maximumFractionDigits: 2 }); }
  function ccNum(n){ return n == null ? '—' : Number(n).toLocaleString('en-US'); }
  function ccPct(x){ return x == null ? '—' : x + '%'; }
  function ccDur(s){ if (!s) return '0s'; s = Math.round(s); const m = Math.floor(s/60); return m ? m + 'm ' + (s % 60) + 's' : s + 's'; }

  function ccSpark(values){
    const v = (values || []).map(Number);
    if (v.length < 2) return '';
    const w = 240, h = 40, p = 3;
    const max = Math.max.apply(null, v), min = Math.min.apply(null, v), rng = (max - min) || 1;
    const step = (w - 2*p) / (v.length - 1);
    const d = v.map((y, i) => {
      const x = p + i*step, yy = h - p - ((y - min)/rng) * (h - 2*p);
      return (i ? 'L' : 'M') + x.toFixed(1) + ' ' + yy.toFixed(1);
    }).join(' ');
    return '<svg class="cc-spark" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" width="100%" height="40" aria-hidden="true">'
         + '<path d="' + d + '" fill="none" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>';
  }

  function ccCard(title, big, subHtml, sparkHtml, muted){
    return '<div class="cc-card' + (muted ? ' is-muted' : '') + '">'
         + '<h4>' + escapeHtml(title) + '</h4>'
         + '<div class="cc-big">' + big + '</div>'
         + (subHtml ? '<div class="cc-sub">' + subHtml + '</div>' : '')
         + (sparkHtml || '')
         + '</div>';
  }
  function ccDead(title, msg){
    return ccCard(title, '<span style="font-size:17px;color:var(--muted);">Not connected</span>',
      '<span class="cc-note">' + escapeHtml(msg || '') + '</span>', '', true);
  }
  function ccGroup(title, cards){
    return '<div class="cc-section"><h2>' + escapeHtml(title) + '</h2><div class="cc-grid">' + cards.join('') + '</div></div>';
  }

  function renderOverview(d){
    $('[data-admin-loading]').hidden = true;
    const c = $('[data-admin-content]'); c.hidden = false;
    const S = d.sections || {};
    let html = '';

    // Money — orders, MRR, Stripe
    let cards = [];
    if (S.store && S.store.status === 'ok') {
      const o = S.store.data.orders, sub = S.store.data.subscriptions;
      cards.push(ccCard('Revenue · 30 days', ccMoney(o.d30.gross_cents),
        'Today <b>' + ccMoney(o.today.gross_cents) + '</b> · 7d <b>' + ccMoney(o.d7.gross_cents) + '</b><br>'
        + 'Net <b>' + ccMoney(o.d30.net_cents) + '</b> · AOV <b>' + ccMoney(o.d30.aov_cents) + '</b>',
        ccSpark(o.spark30)));
      cards.push(ccCard('Orders · 30 days', ccNum(o.d30.count),
        'Today <b>' + ccNum(o.today.count) + '</b> · 7d <b>' + ccNum(o.d7.count) + '</b><br>'
        + 'All-time <b>' + ccNum(o.all_time_count) + '</b> · Awaiting ship <b>' + ccNum(o.pending_fulfillment) + '</b>'));
      cards.push(ccCard('MRR', ccMoney(sub.mrr_cents),
        'Active subs <b>' + ccNum(sub.active) + '</b> · Past due <b>' + ccNum(sub.past_due) + '</b><br>'
        + 'Churn 30d <b>' + ccNum(sub.churn_30d) + '</b>'
        + (sub.unknown_price_items ? '<br><span class="cc-flag">' + sub.unknown_price_items + ' sub item(s) with unmapped price id</span>' : '')));
    } else if (S.store) {
      cards.push(ccDead('Store metrics', S.store.error || 'Supabase error'));
    }
    const f = S.finance;
    if (f && f.status === 'ok') {
      const fd = f.data, np = fd.next_payout;
      cards.push(ccCard('Stripe balance', ccMoney(fd.available_cents),
        'Pending <b>' + ccMoney(fd.pending_cents) + '</b><br>'
        + (np ? 'Next payout <b>' + ccMoney(np.amount_cents) + '</b> · ' + fmtDate(new Date(np.arrival_date*1000).toISOString())
              : 'No payout scheduled')
        + (fd.volume_30d ? '<br>30d net <b>' + ccMoney(fd.volume_30d.net_cents) + '</b> · fees <b>' + ccMoney(fd.volume_30d.fee_cents) + '</b>' : '')));
    } else if (f && f.status === 'not_connected') {
      cards.push(ccDead('Stripe balance', 'STRIPE_SECRET_KEY not configured'));
    } else if (f) {
      cards.push(ccDead('Stripe balance', f.error || 'Stripe error'));
    }
    html += ccGroup('Money', cards);

    // Traffic & conversion
    cards = [];
    const t = S.traffic;
    if (t && t.status === 'ok') {
      const td = t.data;
      cards.push(ccCard('Visitors · 30 days', ccNum(td.d30.visitors),
        'Today <b>' + ccNum(td.today.visitors) + '</b> · 7d <b>' + ccNum(td.d7.visitors) + '</b><br>'
        + 'Pageviews 30d <b>' + ccNum(td.d30.pageviews) + '</b>',
        ccSpark(td.spark30)));
      cards.push(ccCard('Engagement · 30 days',
        (td.d30.bounce_rate == null ? '—' : Math.round(td.d30.bounce_rate) + '%'),
        'Bounce rate · 30d<br>Avg visit <b>' + ccDur(td.d30.visit_duration) + '</b>'));
      const srcList = (td.top_sources || []).slice(0, 5)
        .map(s => '<div class="cc-mini">' + escapeHtml(s.source) + '<span>' + ccNum(s.visitors) + '</span></div>').join('')
        || '<span class="cc-note">No source data</span>';
      cards.push(ccCard('Sources · 30d', 'Social → site ' + ccNum(td.social_to_site_d30), srcList));
      const fn = td.onsite_ctr;
      cards.push(ccCard('On-site click-through', ccPct(fn.cart_to_checkout),
        'Product → cart <b>' + ccPct(fn.product_to_cart) + '</b><br>'
        + 'Cart → checkout <b>' + ccPct(fn.cart_to_checkout) + '</b><br>'
        + 'Checkout → purchase <b>' + ccPct(fn.checkout_to_purchase) + '</b>'));
    } else if (t && t.status === 'not_connected') {
      cards.push(ccDead('Website traffic', 'PLAUSIBLE_API_KEY not configured'));
    } else if (t) {
      cards.push(ccDead('Website traffic', t.error || 'Plausible error'));
    }
    const cv = S.conversion;
    if (cv && cv.status === 'ok') {
      cards.push(ccCard('Conversion · 30 days', ccPct(cv.data.order_conversion_pct),
        'Visitors <b>' + ccNum(cv.data.visitors) + '</b> → orders <b>' + ccNum(cv.data.orders) + '</b><br>'
        + 'Newsletter signup rate <b>' + ccPct(cv.data.newsletter_conversion_pct) + '</b>'));
    } else {
      cards.push(ccDead('Conversion', 'Needs store + Plausible connected'));
    }
    cards.push(ccCard('Email click-through', '—',
      '<span class="cc-note">Resend exposes no broadcast open/click API. List health is under Audience; per-campaign CTR is in the Resend dashboard. Phase 2 wires a Resend events webhook.</span>', '', true));
    cards.push(ccCard('Ad click-through', '—',
      '<span class="cc-note">No ad campaigns running. Meta Ads API unavailable (developer-account dead end); activates if paid ads + a Meta token are ever added.</span>', '', true));
    html += ccGroup('Traffic & conversion', cards);

    // Audience & social
    cards = [];
    if (S.store && S.store.status === 'ok') {
      const nl = S.store.data.newsletter, rv = S.store.data.reviews;
      const bySrc = (nl.by_source || [])
        .map(x => '<div class="cc-mini">' + escapeHtml(x.source) + '<span>' + ccNum(x.count) + '</span></div>').join('');
      cards.push(ccCard('Newsletter', ccNum(nl.total_active),
        'New 7d <b>' + ccNum(nl.new_d7) + '</b> · 30d <b>' + ccNum(nl.new_d30) + '</b><br>'
        + 'Unsub 30d <b>' + ccNum(nl.unsub_d30) + '</b> · welcome pending <b>' + ccNum(nl.welcome_pending) + '</b>'
        + (bySrc ? '<br>' + bySrc : '')));
      cards.push(ccCard('Reviews', ccNum(rv.published) + ' published',
        'Pending <b>' + ccNum(rv.pending) + '</b><br>'
        + 'Avg rating <b>' + (rv.avg_published_rating == null ? '—' : rv.avg_published_rating) + '</b>'));
    }
    const yt = S.social && S.social.youtube;
    if (yt && yt.status === 'ok') {
      const ch = yt.data.channel;
      const vids = (yt.data.recent_videos || []).slice(0, 3)
        .map(v => '<div class="cc-mini">' + escapeHtml((v.title || '').slice(0, 38)) + '<span>' + ccNum(v.views) + '</span></div>').join('');
      cards.push(ccCard('YouTube', ccNum(ch.subscribers) + ' subs',
        'Total views <b>' + ccNum(ch.total_views) + '</b> · videos <b>' + ccNum(ch.video_count) + '</b>'
        + (vids ? '<br>' + vids : '')));
    } else if (yt && yt.status === 'not_connected') {
      cards.push(ccDead('YouTube', 'Add YOUTUBE_API_KEY + YOUTUBE_CHANNEL_ID'));
    } else if (yt) {
      cards.push(ccDead('YouTube', yt.error || 'YouTube error'));
    }
    const ig = S.social && S.social.instagram, fb = S.social && S.social.facebook;
    cards.push(ccDead('Instagram', ig && ig.note));
    cards.push(ccDead('Facebook', fb && fb.note));
    html += ccGroup('Audience & social', cards);

    html += '<div class="cc-sub" style="margin-top:8px;">Generated ' + fmtDate(d.generated_at)
          + ' · ' + escapeHtml(d.cache || '')
          + ' · <a href="#" data-cc-refresh style="color:var(--amber);">force refresh</a></div>';
    c.innerHTML = html;
  }

  async function loadOverview(fresh){
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('is-active', b.dataset.tab === 'overview'));
    $('[data-admin-loading]').hidden = false;
    $('[data-admin-content]').hidden = true;
    let resp;
    try { resp = await fetch('/api/admin/overview' + (fresh ? '?fresh=1' : ''), { credentials: 'include' }); }
    catch(_) { showStatus('Network error.', false); $('[data-admin-loading]').hidden = true; return; }
    if (!resp.ok) {
      if (resp.status === 401 || resp.status === 403) {
        showStatus('Not authorized. Make sure Cloudflare Access has approved your email.', false);
      } else {
        showStatus('Could not load dashboard (HTTP ' + resp.status + ').', false);
      }
      $('[data-admin-loading]').hidden = true;
      return;
    }
    let data;
    try { data = await resp.json(); }
    catch(_) { showStatus('Bad dashboard response.', false); $('[data-admin-loading]').hidden = true; return; }
    renderOverview(data);
  }

  document.addEventListener('DOMContentLoaded', () => loadOverview());
})();
</script>
</body>
</html>
